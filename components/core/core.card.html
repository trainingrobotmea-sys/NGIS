<!-- @dsCard group="Components" viewport="700x620" name="Core primitives" subtitle="Buttons, badges, tags, inputs, alerts, stats, avatars" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--surface-subtle); padding: 22px; color: var(--text-body); }
  .group { background: var(--surface-page); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 16px; margin-bottom: 14px; }
  .gl { font-size: 11px; font-weight: 700; letter-spacing: var(--tracking-wide); text-transform: uppercase; color: var(--text-muted); margin: 0 0 12px; }
  .row { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { Button, IconButton, Badge, Tag, Card, Stat, Input, Select, Alert, Avatar, EyebrowLabel } = window.NGISDesignSystem_f6dc23;
    const X = () => (
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    );
    function Demo() {
      return (
        <React.Fragment>
          <div className="group">
            <p className="gl">Buttons</p>
            <div className="row">
              <Button variant="primary">Apply now</Button>
              <Button variant="navy">Book a tour</Button>
              <Button variant="secondary">Prospectus</Button>
              <Button variant="ghost">Learn more</Button>
              <Button variant="primary" size="sm">Small</Button>
              <Button variant="primary" disabled>Disabled</Button>
              <IconButton variant="outline" label="close"><X/></IconButton>
            </div>
          </div>
          <div className="group">
            <p className="gl">Badges &amp; Tags</p>
            <div className="row">
              <Badge tone="brand">Admissions open</Badge>
              <Badge tone="navy">Year 7–13</Badge>
              <Badge tone="success">Accredited</Badge>
              <Badge tone="info">New</Badge>
              <Tag color="navy" active>All</Tag>
              <Tag color="blue">Academics</Tag>
              <Tag color="green">Student life</Tag>
            </div>
          </div>
          <div className="group">
            <p className="gl">Stats &amp; Cards</p>
            <div className="row" style={{ gap: 28 }}>
              <Stat value="98%" label="University placement" color="red" />
              <Stat value="1:8" label="Teacher ratio" color="navy" />
              <Stat value="40+" label="Nationalities" color="blue" />
              <Card accent="gold" padding="14px" style={{ maxWidth: 220 }}>
                <EyebrowLabel color="gold">Innovation</EyebrowLabel>
                <div style={{ fontFamily: 'var(--font-serif)', fontSize: 18, fontWeight: 700, color: 'var(--text-strong)', marginTop: 4 }}>STEM &amp; Industry 4.0</div>
              </Card>
            </div>
          </div>
          <div className="group">
            <p className="gl">Forms &amp; Alert</p>
            <div className="row" style={{ alignItems: 'flex-start' }}>
              <Input label="Parent name" placeholder="Full name" containerStyle={{ width: 200 }} />
              <Select label="Year group" options={['Early Years','Primary','Secondary','Sixth Form']} containerStyle={{ width: 180 }} />
              <Avatar name="Amara Okoye" />
              <Alert tone="success" title="Application received" style={{ flex: 1, minWidth: 200 }}>We will be in touch within three working days.</Alert>
            </div>
          </div>
        </React.Fragment>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
  </script>
</body>
</html>
