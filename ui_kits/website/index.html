<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NextGen International School</title>
<link rel="stylesheet" href="../../styles.css">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body { font-family: var(--font-sans); color: var(--text-body); background: var(--surface-page); -webkit-font-smoothing: antialiased; }
  a { color: inherit; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel" src="Icon.jsx"></script>
<script type="text/babel" src="Decor.jsx"></script>
<script type="text/babel" src="Campuses.jsx"></script>
<script type="text/babel" src="Header.jsx"></script>
<script type="text/babel" src="Footer.jsx"></script>
<script type="text/babel" src="HomeScreen.jsx"></script>
<script type="text/babel" src="AcademicsScreen.jsx"></script>
<script type="text/babel" src="FacultyScreen.jsx"></script>
<script type="text/babel" src="AdmissionsScreen.jsx"></script>
<script type="text/babel" src="GalleryScreen.jsx"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
  function App() {
    const [route, setRoute] = React.useState('Home');
    const go = (r) => { setRoute(r); window.scrollTo({ top: 0, behavior: 'smooth' }); };
    const { Header, Footer, HomeScreen, AcademicsScreen, AdmissionsScreen, GalleryScreen, FacultyScreen } = window;
    return (
      <React.Fragment>
        <Header active={route} onNav={go} />
        {route === 'Academics' ? <AcademicsScreen onNav={go} />
          : route === 'Faculty' ? <FacultyScreen onNav={go} />
          : route === 'Admissions' ? <AdmissionsScreen onNav={go} />
          : route === 'Gallery' ? <GalleryScreen onNav={go} />
          : <HomeScreen onNav={go} />}
        <Footer onNav={go} />
      </React.Fragment>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
