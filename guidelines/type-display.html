<!-- @dsCard group="Type" viewport="700x180" name="Display — Spectral serif" subtitle="Editorial headings with academic gravitas" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--surface-page); padding: 24px; }
  .disp { font-family: var(--font-serif); color: var(--text-strong); line-height: var(--leading-tight); letter-spacing: var(--tracking-tight); margin: 0; }
  .h1 { font-size: 52px; font-weight: 700; }
  .h2 { font-size: 30px; font-weight: 600; margin-top: 10px; }
  .note { font-family: var(--font-sans); font-size: 11px; color: var(--text-muted); margin-top: 12px; letter-spacing: var(--tracking-wide); text-transform: uppercase; }
</style>
</head>
<body>
  <p class="disp h1">Transforming education</p>
  <p class="disp h2">A globally minded school grounded in character</p>
  <div class="note">Spectral · 700 / 600 · tight leading</div>
</body>
</html>
