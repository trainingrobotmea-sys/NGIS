<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--surface-page); padding: 20px 24px; }
  .row { display: flex; gap: 12px; }
  .pill { flex: 1; border-radius: var(--radius-lg); padding: 14px; color: #fff; }
  .t { font-size: 13px; font-weight: 800; margin: 0 0 3px; }
  .d { font-size: 11px; margin: 0; opacity: 0.92; line-height: 1.35; }
  .gold .t, .gold .d { color: var(--ink-900); }
</style>
</head>
<body>
  <div class="row">
    <div class="pill" style="background:var(--green-500)"><p class="t">Growth</p><p class="d">Academic achievement</p></div>
    <div class="pill" style="background:var(--navy-500)"><p class="t">Future-ready</p><p class="d">Industry 4.0 learning</p></div>
    <div class="pill" style="background:var(--blue-500)"><p class="t">Literacy</p><p class="d">Knowledge &amp; enquiry</p></div>
    <div class="pill gold" style="background:var(--gold-500)"><p class="t">Innovation</p><p class="d">Ideas &amp; care</p></div>
  </div>
</body>
</html>
