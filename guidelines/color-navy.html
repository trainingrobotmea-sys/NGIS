<!-- @dsCard group="Colors" viewport="700x150" name="Brand — Navy (anchor)" subtitle="Authoritative anchor: headers, footers, headings" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--surface-page); padding: 20px; }
  .row { display: flex; gap: 10px; }
  .sw { flex: 1; border-radius: var(--radius-md); border: 1px solid var(--border); overflow: hidden; }
  .chip { height: 64px; }
  .meta { padding: 8px 10px; }
  .name { font-size: 12px; font-weight: 700; color: var(--text-strong); }
  .hex { font-size: 11px; color: var(--text-muted); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--navy-50)"></div><div class="meta"><div class="name">navy-50</div><div class="hex">#eaeef5</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--navy-100)"></div><div class="meta"><div class="name">navy-100</div><div class="hex">#cfdaea</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--navy-500)"></div><div class="meta"><div class="name">navy-500 ·ink</div><div class="hex">#183763</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--navy-600)"></div><div class="meta"><div class="name">navy-600</div><div class="hex">#122c50</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--navy-700)"></div><div class="meta"><div class="name">navy-700</div><div class="hex">#0d2240</div></div></div>
  </div>
</body>
</html>
