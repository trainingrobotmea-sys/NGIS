<!-- @dsCard group="Colors" viewport="700x150" name="Brand — Accents (green · cerulean · gold)" subtitle="Secondary quadrant colors for section coding — one per surface" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--surface-page); padding: 20px; }
  .row { display: flex; gap: 10px; }
  .sw { flex: 1; border-radius: var(--radius-md); border: 1px solid var(--border); overflow: hidden; }
  .chip { height: 64px; }
  .meta { padding: 8px 10px; }
  .name { font-size: 12px; font-weight: 700; color: var(--text-strong); }
  .hex { font-size: 11px; color: var(--text-muted); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--green-500)"></div><div class="meta"><div class="name">green-500</div><div class="hex">#4ab84b</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--green-600)"></div><div class="meta"><div class="name">green-600</div><div class="hex">#3a9a3b</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--blue-500)"></div><div class="meta"><div class="name">blue-500</div><div class="hex">#2394be</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--blue-600)"></div><div class="meta"><div class="name">blue-600</div><div class="hex">#1b7a9e</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--gold-500)"></div><div class="meta"><div class="name">gold-500</div><div class="hex">#fdcc0e</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--gold-600)"></div><div class="meta"><div class="name">gold-600</div><div class="hex">#e0b400</div></div></div>
  </div>
</body>
</html>
