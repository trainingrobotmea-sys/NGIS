<!-- @dsCard group="Spacing" viewport="700x150" name="Corner radius" subtitle="Restrained, institutional — pill only for tags" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--surface-page); padding: 22px 24px; }
  .row { display: flex; gap: 18px; align-items: flex-end; }
  .col { text-align: center; }
  .box { width: 78px; height: 60px; background: var(--navy-50); border: 1px solid var(--navy-100); }
  .lab { font-size: 11px; color: var(--text-strong); font-weight: 700; margin-top: 8px; }
  .px { font-size: 10px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="row">
    <div class="col"><div class="box" style="border-radius:var(--radius-sm)"></div><div class="lab">sm</div><div class="px">4px</div></div>
    <div class="col"><div class="box" style="border-radius:var(--radius-md)"></div><div class="lab">md</div><div class="px">8px · default</div></div>
    <div class="col"><div class="box" style="border-radius:var(--radius-lg)"></div><div class="lab">lg</div><div class="px">12px · cards</div></div>
    <div class="col"><div class="box" style="border-radius:var(--radius-xl)"></div><div class="lab">xl</div><div class="px">18px · panels</div></div>
    <div class="col"><div class="box" style="border-radius:var(--radius-pill);width:60px"></div><div class="lab">pill</div><div class="px">tags</div></div>
  </div>
</body>
</html>
