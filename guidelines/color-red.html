<!-- @dsCard group="Colors" viewport="700x150" name="Brand — Red (primary)" subtitle="Primary brand color: ring, wordmark, main actions" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--surface-page); padding: 20px; }
  .row { display: flex; gap: 10px; }
  .sw { flex: 1; border-radius: var(--radius-md); border: 1px solid var(--border); overflow: hidden; }
  .chip { height: 64px; }
  .meta { padding: 8px 10px; }
  .name { font-size: 12px; font-weight: 700; color: var(--text-strong); }
  .hex { font-size: 11px; color: var(--text-muted); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--red-50)"></div><div class="meta"><div class="name">red-50</div><div class="hex">#fdecec</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--red-100)"></div><div class="meta"><div class="name">red-100</div><div class="hex">#fbd5d6</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--red-500)"></div><div class="meta"><div class="name">red-500 ·brand</div><div class="hex">#e41e27</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--red-600)"></div><div class="meta"><div class="name">red-600 ·hover</div><div class="hex">#d11820</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--red-700)"></div><div class="meta"><div class="name">red-700 ·active</div><div class="hex">#b01219</div></div></div>
  </div>
</body>
</html>
