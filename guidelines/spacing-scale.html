<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing scale" subtitle="8px base grid with 4px half-steps" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--surface-page); padding: 22px 24px; }
  .row { display: flex; align-items: flex-end; gap: 14px; }
  .col { text-align: center; }
  .bar { background: var(--navy-500); border-radius: var(--radius-sm); width: 100%; }
  .lab { font-size: 10.5px; color: var(--text-strong); font-weight: 700; margin-top: 6px; }
  .px { font-size: 9.5px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="row">
    <div class="col" style="width:24px"><div class="bar" style="height:4px"></div><div class="lab">1</div><div class="px">4</div></div>
    <div class="col" style="width:28px"><div class="bar" style="height:8px"></div><div class="lab">2</div><div class="px">8</div></div>
    <div class="col" style="width:32px"><div class="bar" style="height:12px"></div><div class="lab">3</div><div class="px">12</div></div>
    <div class="col" style="width:36px"><div class="bar" style="height:16px"></div><div class="lab">4</div><div class="px">16</div></div>
    <div class="col" style="width:44px"><div class="bar" style="height:24px"></div><div class="lab">5</div><div class="px">24</div></div>
    <div class="col" style="width:52px"><div class="bar" style="height:32px"></div><div class="lab">6</div><div class="px">32</div></div>
    <div class="col" style="width:64px"><div class="bar" style="height:48px"></div><div class="lab">7</div><div class="px">48</div></div>
    <div class="col" style="width:80px"><div class="bar" style="height:64px"></div><div class="lab">8</div><div class="px">64</div></div>
  </div>
</body>
</html>
