<!-- @dsCard group="Brand" viewport="700x300" name="Logo — primary crest" subtitle="Full crest, wordmark and tagline lockup on white" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--surface-page); padding: 24px; display: flex; gap: 28px; align-items: center; }
  .logo { width: 240px; height: 240px; object-fit: contain; }
  .info { max-width: 320px; }
  .h { font-family: var(--font-serif); font-size: 22px; font-weight: 700; color: var(--text-strong); margin: 0 0 8px; }
  .p { font-size: 13px; line-height: var(--leading-normal); color: var(--text-body); margin: 0 0 10px; }
  .rule { font-size: 11.5px; color: var(--text-muted); margin: 0; padding-left: 14px; border-left: var(--border-accent) solid var(--brand); }
</style>
</head>
<body>
  <img class="logo" src="../assets/ngis-logo-full.jpeg" alt="NextGen International School crest">
  <div class="info">
    <p class="h">NextGen International School</p>
    <p class="p">The primary crest is the cornerstone of the brand. Preserve the full lockup — crest, wordmark, and tagline — wherever space allows.</p>
    <p class="rule">Always reproduce on white or very light backgrounds. Maintain clear space equal to the red star's height on all sides.</p>
  </div>
</body>
</html>
