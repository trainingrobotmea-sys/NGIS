<!-- @dsCard group="Type" viewport="700x300" name="Type scale" subtitle="Major-third scale, Spectral display + Mulish body" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--surface-page); padding: 22px 24px; }
  .line { display: flex; align-items: baseline; gap: 16px; padding: 5px 0; border-bottom: 1px solid var(--border); }
  .line:last-child { border-bottom: 0; }
  .tag { font-size: 10.5px; color: var(--text-muted); width: 116px; flex-shrink: 0; font-variant-numeric: tabular-nums; }
  .samp { font-family: var(--font-serif); color: var(--text-strong); line-height: 1.1; }
  .samp.sans { font-family: var(--font-sans); }
</style>
</head>
<body>
  <div class="line"><span class="tag">5xl · 52 · serif</span><span class="samp" style="font-size:40px;font-weight:700">Aa NextGen</span></div>
  <div class="line"><span class="tag">4xl · 40 · serif</span><span class="samp" style="font-size:32px;font-weight:600">Academics &amp; pathways</span></div>
  <div class="line"><span class="tag">3xl · 30 · serif</span><span class="samp" style="font-size:24px;font-weight:600">Admissions open</span></div>
  <div class="line"><span class="tag">xl · 20 · sans</span><span class="samp sans" style="font-size:18px;font-weight:700">Section heading</span></div>
  <div class="line"><span class="tag">base · 16 · sans</span><span class="samp sans" style="font-size:16px;font-weight:400">Body copy for prospective families.</span></div>
  <div class="line"><span class="tag">sm · 14 · sans</span><span class="samp sans" style="font-size:14px;font-weight:500;color:var(--text-muted)">Meta and labels</span></div>
</body>
</html>
