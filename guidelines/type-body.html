<!-- @dsCard group="Type" viewport="700x180" name="Body — Mulish sans" subtitle="UI, labels and body copy — clean and legible" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--surface-page); padding: 24px; max-width: 620px; }
  .lead { font-size: 18px; line-height: var(--leading-normal); color: var(--text-strong); font-weight: 600; margin: 0 0 8px; }
  .para { font-size: 16px; line-height: var(--leading-relaxed); color: var(--text-body); margin: 0; }
  .note { font-size: 11px; color: var(--text-muted); margin-top: 14px; letter-spacing: var(--tracking-wide); text-transform: uppercase; }
</style>
</head>
<body>
  <p class="lead">From early years to graduation, we prepare confident, curious learners.</p>
  <p class="para">Our curriculum blends rigorous academics with character education, equipping every student for a world being reshaped by technology and global change.</p>
  <div class="note">Mulish · 400 / 600 / 800 · 16–18px</div>
</body>
</html>
