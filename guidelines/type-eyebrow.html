<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--surface-page); padding: 24px; display: flex; gap: 28px; align-items: center; flex-wrap: wrap; }
  .eb { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: var(--tracking-wide); }
  .tag { font-size: 11px; color: var(--text-muted); letter-spacing: var(--tracking-wider); text-transform: uppercase; }
</style>
</head>
<body>
  <span class="eb" style="color:var(--brand)">Admissions</span>
  <span class="eb" style="color:var(--brand-ink)">Why NGIS</span>
  <span class="eb" style="color:var(--blue-600)">Academics</span>
  <span class="eb" style="color:var(--green-600)">Student life</span>
  <span class="tag">· tracking-wide</span>
</body>
</html>
