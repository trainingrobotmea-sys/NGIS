<!-- @dsCard group="Colors" viewport="700x150" name="Neutrals — cool slate ramp" subtitle="Text, surfaces, and borders — harmonized with navy" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--surface-page); padding: 20px; }
  .row { display: flex; gap: 6px; }
  .sw { flex: 1; border-radius: var(--radius-sm); border: 1px solid var(--border); overflow: hidden; }
  .chip { height: 56px; }
  .meta { padding: 6px 7px; }
  .name { font-size: 10.5px; font-weight: 700; color: var(--text-strong); }
  .hex { font-size: 9.5px; color: var(--text-muted); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--ink-900)"></div><div class="meta"><div class="name">ink-900</div><div class="hex">#0f1a2b</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-700)"></div><div class="meta"><div class="name">ink-700</div><div class="hex">#334155</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-500)"></div><div class="meta"><div class="name">ink-500</div><div class="hex">#64748b</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-400)"></div><div class="meta"><div class="name">ink-400</div><div class="hex">#94a3b8</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-300)"></div><div class="meta"><div class="name">ink-300</div><div class="hex">#cbd5e1</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-200)"></div><div class="meta"><div class="name">ink-200</div><div class="hex">#e2e8f0</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-50)"></div><div class="meta"><div class="name">ink-50</div><div class="hex">#f6f8fa</div></div></div>
  </div>
</body>
</html>
