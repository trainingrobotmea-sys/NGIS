<!-- @dsCard group="Spacing" viewport="700x170" name="Elevation / shadows" subtitle="Soft, cool-tinted — never heavy" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--surface-subtle); padding: 28px 24px; }
  .row { display: flex; gap: 24px; }
  .col { text-align: center; flex: 1; }
  .box { height: 64px; background: var(--surface-card); border-radius: var(--radius-lg); }
  .lab { font-size: 11px; color: var(--text-strong); font-weight: 700; margin-top: 12px; }
  .px { font-size: 10px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="row">
    <div class="col"><div class="box" style="box-shadow:var(--shadow-xs)"></div><div class="lab">xs</div><div class="px">hairline lift</div></div>
    <div class="col"><div class="box" style="box-shadow:var(--shadow-sm)"></div><div class="lab">sm</div><div class="px">resting card</div></div>
    <div class="col"><div class="box" style="box-shadow:var(--shadow-md)"></div><div class="lab">md</div><div class="px">hover / raised</div></div>
    <div class="col"><div class="box" style="box-shadow:var(--shadow-lg)"></div><div class="lab">lg</div><div class="px">modal / menu</div></div>
  </div>
</body>
</html>
